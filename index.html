<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My First Website</title>

  <style>
    /* ── Reset & Base ── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Georgia, serif;
      font-size: 16px;
      color: #111;
    }

    /* ── 1. HEADER ── */
    header {
      background-color: #1a008c;   /* dark navy/purple like the screenshot */
      color: #ffffff;
      text-align: center;
      padding: 30px 20px 15px;
    }

    header h1 {
      font-size: 2.2rem;
      font-weight: bold;
      margin-bottom: 15px;
    }

    /* ── Navigation ── */
    nav {
      background-color: #1a008c;
      text-align: center;
      padding-bottom: 18px;
    }

    nav a {
      color: #ffffff;
      text-decoration: none;
      margin: 0 18px;
      font-size: 1rem;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* ── 2. HERO SECTION ── */
    #hero {
      background-color: #add8e6;   /* light blue like the screenshot */
      text-align: center;
      padding: 50px 20px;
    }

    #hero h1 {
      font-size: 1.8rem;
      margin-bottom: 15px;
      color: #111;
    }

    #hero p {
      font-size: 1rem;
      margin-bottom: 25px;
      color: #333;
    }

    /* "Learn More" button/heading with hover effect */
    #learn-more {
      display: inline-block;
      background-color: #1a008c;
      color: #ffffff;
      padding: 10px 24px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: background-color 0.3s ease, transform 0.2s ease;
    }

    #learn-more:hover {
      background-color: #ff6600;   /* hover turns orange */
      transform: scale(1.05);
    }

    /* ── 3. ABOUT SECTION ── */
    #about {
      padding: 40px 30px;
      background-color: #ffffff;
    }

    #about h1 {
      font-size: 1.6rem;
      margin-bottom: 12px;
      color: #111;
    }

    #about p {
      font-size: 0.97rem;
      color: #5a3e8a;              /* purple text like screenshot */
      line-height: 1.6;
    }

    /* ── 4. FOOTER ── */
    footer {
      background-color: #222222;
      color: #cccccc;
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
    }

    footer a {
      color: #7b5ea7;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>

</head>

<body>

  <!-- 1. HEADER -->

  <header>
    <h1>My Website</h1>
  </header>

  <!-- Navigation -->

  <nav>
    <a href="#hero">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </nav>

  <!-- 2. HERO SECTION -->

  <section id="hero">
    <h1>Welcome to My Website</h1>
    <p>This is my first HTML and CSS project.</p>
    <span id="learn-more">Learn More</span>
  </section>

  <!-- 3. ABOUT SECTION -->

  <section id="about">
    <h1>About</h1>
    <p>Im Tebogo im from pretoria.</p>
  </section>

  <!-- 4. FOOTER -->

  <footer id="contact">
    <p>© 2026 <a href="#">My Website</a></p>
  </footer>

</body>
</html>
